<!DOCTYPE html>
<html lang="en">
  <head>
    <title>&nbsp;</title>
    <link rel="stylesheet" type="text/css" href="./css/shared.css" />
    <link rel="stylesheet" href="./fa/css/all.min.css" />
    <link
      href="https://fonts.googleapis.com/css?family=Staatliches&display=swap"
      rel="stylesheet"
    />
    <meta charset="utf-8" />
    <style>
      * {
        float: left;
        margin: 0px;
        padding: 0px;
        box-sizing: border-box !important;
      }

      canvas {
        position: absolute;
        top: 0;
        left: 0;
      }

      #fab-menu {
        position: absolute;
        top: 2px;
        left: 2px;
        border: 1px solid white;
        padding: 8px;
        border-radius: 3px;
        color: white;
        background-color: rgb(0, 0, 0, 0.8);
        z-index: 15000;
        user-select: none;
        -moz-user-select: none;
        display: flex;
        flex-direction: row;
        flex-wrap: nowrap;
        align-items: center;
      }
      #fab-menu.open {
        padding: 6.4px 8px;
      }
      #fab-menu:hover {
        box-shadow: 0px 0px 8px white;
      }
      #fab-menu > :not(.fab-text) {
        display: none;
      }
      #fab-menu.open > *:not(.fab-text) {
        display: block;
        margin-left: 1rem;
      }
      .fab-btn {
        border: 1px solid rgb(194, 194, 194);
        padding: 1px;
        border-radius: 2px;
        color: white;
        background-color: rgb(0, 0, 0, 0.8);
      }
      .fab-btn:hover {
        cursor: pointer;
        box-shadow: 0px 0px 8px white;
      }

      #action-menu {
        position: absolute;
        top: 44px;
        left: 2px;
        border: 1px solid white;
        padding: 8px;
        border-radius: 3px;
        color: white;
        background-color: rgb(0, 0, 0, 0.8);
        z-index: 15000;
        user-select: none;
        -moz-user-select: none;
        display: none;
        flex-direction: row;
        flex-wrap: nowrap;
        align-items: center;
      }
      #action-menu > *:not(:first-child) {
        display: block;
        margin-left: 1rem;
        line-height: 1.2;
      }
      #action-menu > :last-child {
        height: 21px;
      }
    </style>
  </head>

  <body>
    <div id="fab-menu" class="" onclick="togglefab()">
      <div class="fab-text">menu</div>
      <div id="loadBtn" class="fab-btn">load song</div>
      <div id="recordBtn" class="fab-btn">record song</div>
    </div>
    <div id="action-menu" class="">
      <div class="fab-btn">
        <i class="fas fa-backward"></i>
      </div>
      <div class="fab-btn">
        <i class="fas fa-play"></i>
      </div>
      <div class="fab-btn">
        <i class="fas fa-pause"></i>
      </div>
      <div class="fab-btn">
        <i class="fas fa-stop"></i>
      </div>
      <div class="fab-btn">
        <i class="fas fa-forward"></i>
      </div>
      <div class="fab-btn">
        <input type="range" min="0" max="100" step="1" />
      </div>
    </div>
  </body>
  <script
    defer
    src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
    integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
    crossorigin="anonymous"
  ></script>
  <script src="https://cdn.jsdelivr.net/npm/p5@1.3.1/lib/p5.js"></script>
  <script defer src="./libs/p5s.js"></script>
  <script defer src="./src/main.js"></script>
</html>
