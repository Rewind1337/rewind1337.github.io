<!DOCTYPE html>
<html lang="en">
<head>
	<title>Game of Life</title>
	<link rel="stylesheet" type="text/css" href="interface.css">
	<meta charset="utf-8">
</head>

<body>
 <div id="canvasContainer">
	<canvas onclick="toggleClick()" id="canvasScreen" width="0" height="0"> </canvas>
	<div id="overlay">
		<h1>Conway's Game of Life</h1>
		<div class="divider" style="text-align: left">
			<p>• Grid Size:</p><br>
			<p>• Update Speed:</p><br>
			<br>
			<p style="text-decoration: underline;">Rules:</p><br>
			<p>• toRebirth: (exact)</p><br>
			<p>• toStarve: (more than)</p><br>
			<p>• toDie: (less than)</p><br>
			<p>• toLive: (n and n+1)</p><br>
			<button style="width: 100%; float: left;" id="refresh" onclick="updateValues()">Update Rules</button><br>
			<button style="width: 100%; float: left;" id="hide" onclick="showhide()">Hide this Panel</button><br>
			<button style="width: 100%; float: left;" id="reset" onclick="init()">Reset</button><br>
			<br>
			<p>Tick <input style="width: 50%;" type="number" value="1" min="1" max="999" step="1" id="input_uitick"></input>Times</p>
		</div>
		<div class="divider" style="text-align: right; text-decoration: none;">
			<input type="number" value="12" min="4" max="256" step="2" id="input_gridsize"></input><br>
			<input type="number" value="80" min="1" max="500" step="1" id="input_updatespeed"></input><br>
			<br>
			<br>
			<input type="number" value="3" min="0" max="8" step="1" id="input_rule_rebirth"></input><br>
			<input type="number" value="3" min="0" max="8" step="1" id="input_rule_starve"></input><br>
			<input type="number" value="2" min="0" max="8" step="1" id="input_rule_die"></input><br>
			<input type="number" value="2" min="0" max="8" step="1" id="input_rule_live"></input><br>
			<p>[ - ] to reinitialise</p><br>
			<p>[ + ] to show this again</p><br>
			<p>[Spc] to continuously run</p><br>
			<br>
			<button style="width: 100%; float: left;" id="uitick" onclick="uiTick()">Tick</button>
		</div>
	</div>
	<button onclick="showhide()" id="smalloverlay">
	+
	</button>
</div>

<script type="text/javascript" src="main.js"></script>
</body>
</html>
